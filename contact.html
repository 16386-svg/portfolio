    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* จัดเรียงการ์ดให้อยู่กึ่งกลางพอดีสำหรับ 3 อัน */
        .contact-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            position: relative;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-decoration: none; 
            width: 100%;
            max-width: 260px; /* กำหนดขนาดการ์ดให้เท่ากัน */
        }
        .contact-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03);
        }
        /* ⚡ อนิเมชั่นตอนกดการ์ด */
        .contact-card:active {
            transform: scale(0.96) translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .contact-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 4px 10px rgba(255, 255, 255, 0.1));
        }
        .contact-platform {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .contact-username {
            color: #8a8a93;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            word-break: break-word; /* ป้องกันอีเมลยาวจนล้นกรอบ */
        }
    </style>
</head>
